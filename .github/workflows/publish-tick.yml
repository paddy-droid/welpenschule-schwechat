name: publish-tick

# Woechentlicher Rebuild-Tick: veroeffentlicht terminierte Ratgeber-Artikel automatisch.
# Die Artikel liegen mit zukuenftigem `publishAt` (Europe/Vienna) in src/lib/postsData.ts;
# getPublishedPosts() blendet sie frei, sobald ihr Datum erreicht ist. ISR (revalidate=3600)
# aktualisiert die Seiten stuendlich; dieser Tick erzwingt zusaetzlich einen sauberen
# Full-Rebuild (frische sitemap.xml + statische Seiten) via leeren Commit -> Vercel-Deploy.
on:
  schedule:
    - cron: '17 4 * * 1' # jeden Montag 04:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Leeren Commit fuer Vercel-Rebuild pushen
        run: |
          git config user.name "welpen-publish-bot"
          git config user.email "actions@users.noreply.github.com"
          git commit --allow-empty -m "chore: publish-tick $(date -u +%Y-%m-%d) [skip ci]"
          git push
